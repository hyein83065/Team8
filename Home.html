<!DOCTYPE html>

<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GLS 임원단</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#dfeef9;
    font-family:"맑은 고딕", sans-serif;
    min-height:100vh;
}

/* 제목 */
.title{
    margin:40px 0 0 50px;
    color:#1f6dad;
    font-size:60px;
    font-weight:bold;
}

/* 전체 배치 */
.container{
    display:flex;
    justify-content:center;
    align-items:center;
    gap:100px;
    margin-top:50px;
}

/* 왼쪽 영역 */
.left{
    display:flex;
    flex-direction:column;
    align-items:center;
}

.mascot{
    width:180px;
    margin-bottom:20px;
}

.group-photo{
    width:450px;
    border-radius:25px;
    border:4px solid white;
    box-shadow:0 8px 20px rgba(0,0,0,0.15);
}

.instagram{
    margin-top:20px;
    font-size:18px;
    font-weight:600;
}

.instagram a{
    color:#ff4b87;
    text-decoration:none;
    font-weight:bold;
}

.instagram a:hover{
    text-decoration:underline;
}

/* 오른쪽 메뉴 */
.right{
    display:flex;
    flex-direction:column;
    gap:30px;
}

.menu{
    width:420px;
    height:100px;

    background:white;
    border:none;
    border-radius:25px;

    display:flex;
    justify-content:space-between;
    align-items:center;

    padding:0 35px;

    font-size:28px;
    font-weight:bold;
    color:#2d6ea6;

    cursor:pointer;

    box-shadow:0 8px 20px rgba(0,0,0,0.08);

    transition:0.2s;
}

.menu:hover{
    transform:translateY(-5px);
}

.arrow{
    font-size:40px;
    color:#9ab8d6;
}

/* 모바일 */
@media(max-width:1000px){

    .container{
        flex-direction:column;
        gap:50px;
        margin-top:30px;
    }

    .title{
        text-align:center;
        margin:30px 0;
        font-size:45px;
    }

    .group-photo{
        width:90%;
        max-width:450px;
    }

    .menu{
        width:90vw;
        max-width:420px;
    }
}
</style>

</head>

<body>

<h1 class="title">GLS 임원단</h1>

<div class="container">

<div class="left">

    <img src="mascot.png" alt="마스코트" class="mascot">

    <img src="group.jpg" alt="단체사진" class="group-photo">

    <div class="instagram">
        임원단 인스타그램 공식 계정 :
        <a href="https://www.instagram.com/26gls_sync_official"
           target="_blank">
           @26gls_sync_official
        </a>
    </div>

</div>

<div class="right">

    <button class="menu"
            onclick="location.href='Intro.html'">
        <span>임원단 소개</span>
        <span class="arrow">›</span>
    </button>

    <button class="menu"
            onclick="location.href='Intro2.html'">
        <span>임원단 부서 소개</span>
        <span class="arrow">›</span>
    </button>

    <button class="menu"
            onclick="location.href='QR.html'">
       <span>공지방 입장</span>
       <span class="arrow">›</span>
    </button>

</div>

</div>

</body>
</html>
