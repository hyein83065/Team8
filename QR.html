<!DOCTYPE html>

<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GLS 공지방</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#dfeef9;
    font-family:"맑은 고딕", sans-serif;
    min-height:100vh;
}

.header{
    padding:40px 50px 20px;
}

.back-btn{
    background:white;
    border:none;
    border-radius:15px;
    padding:12px 20px;
    font-size:16px;
    cursor:pointer;
    box-shadow:0 4px 10px rgba(0,0,0,0.08);
}

.back-btn:hover{
    background:#f5f5f5;
}

.container{
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    margin-top:30px;
}

.title{
    color:#1f6dad;
    font-size:48px;
    font-weight:bold;
    margin-bottom:15px;
}

.subtitle{
    color:#666;
    font-size:20px;
    margin-bottom:40px;
}

.card{
    background:white;
    padding:40px;
    border-radius:30px;
    text-align:center;
    box-shadow:0 10px 25px rgba(0,0,0,0.10);
}

.qr{
    width:320px;
    border-radius:15px;
}

.description{
    margin-top:25px;
    font-size:18px;
    color:#444;
    line-height:1.8;
}

</style>

</head>

<body>

<div class="header">
    <button class="back-btn"
        onclick="location.href='Home.html'">
        ← 뒤로 가기
    </button>
</div>

<div class="container">

<h1 class="title">GLS 공지방 입장</h1>

<p class="subtitle">
    다양한 GLS 소식을 만나보세요.
</p>

<div class="card">

    <img src="QR.JPG"
         alt="오픈채팅방 QR"
         class="qr">

    <div class="description">
        카메라 또는 QR 스캐너로<br>
        코드를 인식하면 공지방으로 이동합니다.
    </div>

</div>

</div>

</body>
</html>
